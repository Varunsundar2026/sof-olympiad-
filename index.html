<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOF Grade 2 Olympiad – Smart Practice</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#0d1b3e;
  --gold:#e8a000;
  --gold-light:#ffd166;
  --coral:#e53935;
  --mint:#00897b;
  --mint-light:#e0f2f1;
  --blue:#1565c0;
  --blue-light:#e3f0ff;
  --purple:#6a1b9a;
  --purple-light:#f3e5f5;
  --orange:#e65100;
  --orange-light:#fff3e0;
  --green:#2e7d32;
  --green-light:#e8f5e9;
  --bg:#f0f4fc;
  --card:#ffffff;
  --text:#0d1b3e;
  --text2:#455a7a;
  --border:#cdd8ee;
  --shadow:0 4px 18px rgba(13,27,62,0.10);
  --shadow-lg:0 8px 32px rgba(13,27,62,0.16);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);min-height:100vh;color:var(--text);}

/* HEADER */
.hdr{background:var(–navy);padding:11px 15px;display:flex;align-items:center;gap:11px;position:sticky;top:0;z-index:200;box-shadow:0 3px 14px rgba(0,0,0,0.28);}
.hdr-logo{width:44px;height:44px;border-radius:11px;background:var(–gold-light);display:flex;align-items:center;justify-content:center;font-family:‘Fredoka One’,cursive;font-size:.88rem;color:var(–navy);text-align:center;line-height:1.15;flex-shrink:0;}
.hdr-txt h1{font-family:‘Fredoka One’,cursive;font-size:1.15rem;color:var(–gold-light);line-height:1;}
.hdr-txt p{font-size:.62rem;color:#8aaac8;font-weight:700;text-transform:uppercase;letter-spacing:.4px;}
.hdr-pts{margin-left:auto;background:var(–gold-light);border-radius:18px;padding:3px 13px;text-align:center;}
.hdr-pts .pn{font-family:‘Fredoka One’,cursive;font-size:1.25rem;color:var(–navy);line-height:1;}
.hdr-pts .pl{font-size:.56rem;font-weight:900;color:var(–navy);text-transform:uppercase;}

/* WRAPPER */
.app{max-width:660px;margin:0 auto;}

/* ── HOME ── */
.home{padding:16px 14px 36px;}
.home-h{font-family:‘Fredoka One’,cursive;font-size:1.4rem;color:var(–navy);margin-bottom:3px;}
.home-p{font-size:.8rem;color:var(–text2);font-weight:600;margin-bottom:16px;line-height:1.45;}

.weak-panel{background:#fff5f5;border:2px solid #ffcdd2;border-radius:14px;padding:13px 15px;margin-bottom:16px;display:none;}
.weak-panel.show{display:block;}
.weak-panel h3{font-family:‘Fredoka One’,cursive;font-size:.9rem;color:var(–coral);margin-bottom:9px;}
.weak-chips{display:flex;flex-wrap:wrap;gap:5px;}
.wchip{background:#ffebee;border:1.5px solid #ef9a9a;color:#b71c1c;font-size:.68rem;font-weight:800;padding:3px 10px;border-radius:20px;}

.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.scard{background:var(–card);border-radius:16px;border:2.5px solid var(–border);padding:16px 13px 13px;cursor:pointer;position:relative;overflow:hidden;transition:transform .17s,box-shadow .17s,border-color .17s;}
.scard:hover{transform:translateY(-3px);box-shadow:var(–shadow-lg);}
.scard.has-weak{border-color:#ef9a9a;}
.scard .stripe{position:absolute;top:0;left:0;right:0;height:5px;border-radius:16px 16px 0 0;}
.scard .si{font-size:2rem;margin-bottom:5px;display:block;}
.scard .sn{font-family:‘Fredoka One’,cursive;font-size:1rem;color:var(–navy);margin-bottom:2px;}
.scard .sf{font-size:.6rem;color:var(–text2);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:9px;}
.scard .sp{display:flex;flex-wrap:wrap;gap:5px;}
.pill{font-size:.63rem;font-weight:800;padding:2px 9px;border-radius:18px;}
.pill.info{background:var(–blue-light);color:var(–blue);}
.pill.warn{background:#ffebee;color:var(–coral);}
.wbadge{position:absolute;top:9px;right:9px;background:var(–coral);color:#fff;font-size:.56rem;font-weight:900;padding:2px 7px;border-radius:10px;animation:blink .9s ease-in-out infinite alternate;}
@keyframes blink{from{opacity:.8}to{opacity:1;transform:scale(1.05)}}

/* ── QUIZ SCREEN ── */
.qscr{display:none;}
.qtopbar{background:var(–navy);padding:9px 13px;display:flex;align-items:center;gap:9px;position:sticky;top:57px;z-index:100;}
.bbtn{background:rgba(255,255,255,.14);border:none;color:#fff;width:30px;height:30px;border-radius:50%;font-size:.95rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .14s;}
.bbtn:hover{background:rgba(255,255,255,.26);}
.qlbl{font-family:‘Fredoka One’,cursive;font-size:.95rem;color:#fff;white-space:nowrap;}
.pwrap{flex:1;height:7px;background:rgba(255,255,255,.14);border-radius:8px;overflow:hidden;}
.pbar{height:100%;border-radius:8px;transition:width .5s;background:linear-gradient(90deg,#06d6a0,#ffd166);}
.qctr{font-size:.7rem;font-weight:800;color:#8aaac8;white-space:nowrap;}

.qbody{padding:13px 14px 36px;}

.mpill{display:inline-flex;align-items:center;gap:4px;font-size:.68rem;font-weight:800;padding:3px 11px;border-radius:18px;margin-bottom:9px;}
.mpill.normal{background:var(–blue-light);color:var(–blue);}
.mpill.review{background:#ffebee;color:var(–coral);}

.anotice{background:#fff8e1;border:1.5px solid #ffe082;border-radius:11px;padding:9px 13px;font-size:.76rem;font-weight:700;color:#e65100;margin-bottom:11px;display:none;}
.anotice.show{display:block;}

/* question card */
.qcard{background:var(–card);border-radius:16px;box-shadow:var(–shadow);padding:18px 16px 15px;border-top:5px solid var(–qc,#1565c0);animation:fup .26s ease;}
@keyframes fup{from{opacity:0;transform:translateY(11px)}to{opacity:1;transform:translateY(0)}}
.qmeta{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;}
.qtag{font-size:.65rem;font-weight:900;padding:3px 10px;border-radius:18px;color:#fff;background:var(–qc,#1565c0);}
.qdiff{font-size:.75rem;color:#bbb;}
.qtext{font-size:1rem;font-weight:800;color:var(–navy);line-height:1.55;margin-bottom:15px;}

/* options */
.opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.opt{padding:11px 11px;border-radius:12px;border:2.5px solid var(–border);background:#f6f9ff;cursor:pointer;color:var(–navy);font-family:‘Nunito’,sans-serif;font-size:.86rem;font-weight:700;display:flex;align-items:center;gap:8px;text-align:left;transition:all .13s;line-height:1.3;}
.opt:hover:not(:disabled){border-color:var(–qc,#1565c0);background:var(–blue-light);transform:scale(1.02);}
.opt .ltr{width:24px;height:24px;flex-shrink:0;border-radius:50%;background:var(–border);color:var(–navy);display:flex;align-items:center;justify-content:center;font-size:.67rem;font-weight:900;}
.opt.correct{border-color:#00897b;background:var(–mint-light);}
.opt.correct .ltr{background:#00897b;color:#fff;}
.opt.wrong{border-color:var(–coral);background:#ffebee;}
.opt.wrong .ltr{background:var(–coral);color:#fff;}
.opt:disabled{cursor:default;}

/* feedback */
.fb{margin-top:11px;padding:11px 13px;border-radius:11px;font-size:.8rem;font-weight:700;line-height:1.5;display:none;}
.fb.show{display:block;animation:fup .2s ease;}
.fb.ok{background:var(–mint-light);border:1.5px solid #80cbc4;color:#004d40;}
.fb.fail{background:#ffebee;border:1.5px solid #ef9a9a;color:#b71c1c;}

/* next btn */
.nbtn{display:none;width:100%;margin-top:11px;padding:14px;border-radius:13px;border:none;cursor:pointer;background:var(–navy);color:var(–gold-light);font-family:‘Fredoka One’,cursive;font-size:1rem;box-shadow:0 4px 12px rgba(13,27,62,.18);transition:transform .14s,box-shadow .14s;}
.nbtn:hover{transform:translateY(-2px);box-shadow:0 7px 18px rgba(13,27,62,.26);}
.nbtn.show{display:block;}

/* result */
.rcard{background:var(–card);border-radius:18px;box-shadow:var(–shadow-lg);padding:26px 18px 22px;text-align:center;display:none;animation:fup .3s ease;}
.rcard.show{display:block;}
.rtrophy{font-size:3.2rem;margin-bottom:5px;}
.rtitle{font-family:‘Fredoka One’,cursive;font-size:1.5rem;color:var(–navy);margin-bottom:3px;}
.rfrac{font-family:‘Fredoka One’,cursive;font-size:2.4rem;color:var(–blue);margin-bottom:2px;}
.rpct{font-size:.82rem;font-weight:700;color:var(–text2);margin-bottom:13px;}
.rnotice{font-size:.78rem;font-weight:700;padding:9px 13px;border-radius:11px;margin-bottom:16px;text-align:left;}
.rnotice.ok{background:var(–mint-light);color:#004d40;border:1.5px solid #80cbc4;}
.rnotice.warn{background:#fff8e1;color:#e65100;border:1.5px solid #ffe082;}
.breakdown{margin-bottom:18px;text-align:left;}
.breakdown h3{font-family:‘Fredoka One’,cursive;font-size:.9rem;color:var(–navy);margin-bottom:10px;text-align:center;}
.trow{display:flex;align-items:center;gap:7px;margin-bottom:8px;}
.tlbl{font-size:.72rem;font-weight:800;color:var(–navy);width:126px;flex-shrink:0;line-height:1.2;}
.tlbl .wk{display:inline-block;font-size:.55rem;font-weight:900;background:var(–coral);color:#fff;padding:1px 5px;border-radius:7px;margin-left:3px;vertical-align:middle;}
.bwrap{flex:1;height:10px;background:#e8eef8;border-radius:7px;overflow:hidden;}
.bfill{height:100%;border-radius:7px;transition:width .7s;}
.bpct{font-size:.68rem;font-weight:800;color:var(–text2);width:30px;text-align:right;}
.rbtns{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;}
.rbtn{padding:11px 20px;border-radius:50px;border:none;cursor:pointer;font-family:‘Fredoka One’,cursive;font-size:.9rem;transition:transform .13s;}
.rbtn:hover{transform:scale(1.04);}
.rbtn.primary{background:var(–navy);color:var(–gold-light);}
.rbtn.secondary{background:var(–blue-light);color:var(–blue);}

@media(max-width:430px){
.opts{grid-template-columns:1fr;}
.sgrid{grid-template-columns:1fr;}
}
</style>

</head>

// ── ADAPTIVE ENGINE ──
const WEAK_THR=0.50, MIN_ATT=2, REV_EVERY=3;
let gs={pts:0,ts:{}};

const tk=(s,t)=>s+'|'+t;
function rec(s,t,ok){const k=tk(s,t);if(!gs.ts[k])gs.ts[k]={c:0,n:0};gs.ts[k].n++;if(ok)gs.ts[k].c++;}
function acc(s,t){const k=tk(s,t),x=gs.ts[k];if(!x||x.n<MIN_ATT)return 1;return x.c/x.n;}
function weakOf(s){return S[s].topics.filter(t=>acc(s,t)<WEAK_THR);}
function allWeak(){const r=[];Object.keys(S).forEach(s=>weakOf(s).forEach(t=>r.push({s,lb:S[s].label,t,a:acc(s,t)})));return r.sort((a,b)=>a.a-b.a);}

// ── QUEUE BUILD ──
function buildQ(s){
  const qs=S[s].q, w=weakOf(s);
  let pool=shuf([...qs]).map(q=>({...q,_m:'normal'}));
  if(w.length>0){
    const rp=shuf(qs.filter(q=>w.includes(q.t))).slice(0,8).map(q=>({...q,_m:'review'}));
    const out=[];let ri=0;
    pool.forEach((q,i)=>{out.push(q);if((i+1)%REV_EVERY===0&&ri<rp.length)out.push(rp[ri++]);});
    return out;
  }
  return pool;
}

// ── STATE ──
let csub=null,queue=[],qi=0,sc=0,st=0,stopics={},answered=false;

// ── HOME ──
function renderHome(){
  document.getElementById('homeScreen').style.display='block';
  document.getElementById('qscr').style.display='none';
  document.getElementById('totalPts').textContent=gs.pts;

  const aw=allWeak();
  const gp=document.getElementById('gwp'),gc=document.getElementById('gwc');
  if(aw.length>0){gp.classList.add('show');gc.innerHTML=aw.map(w=>`<span class="wchip">⚠️ ${w.lb}: ${w.t} (${Math.round(w.a*100)}%)</span>`).join('');}
  else gp.classList.remove('show');

  const grid=document.getElementById('sgrid');grid.innerHTML='';
  Object.entries(S).forEach(([k,sub])=>{
    const w=weakOf(k);
    let ta=0,tc=0;
    sub.topics.forEach(t=>{const x=gs.ts[tk(k,t)];if(x){ta+=x.n;tc+=x.c;}});

    const card=document.createElement('div');
    card.className='scard'+(w.length>0?' has-weak':'');
    card.onclick=()=>startQuiz(k);

    let pills='';
    if(ta>0)pills+=`<span class="pill info">✅ ${Math.round(tc/ta*100)}% accuracy</span>`;
    else pills+=`<span class="pill info">Not started yet</span>`;
    if(w.length>0)pills+=`<span class="pill warn">⚠️ ${w.length} weak topic${w.length>1?'s':''}</span>`;
    if(w.length>0)card.innerHTML+=`<div class="wbadge">NEEDS REVIEW</div>`;

    card.innerHTML+=`
      <div class="stripe" style="background:${sub.color}"></div>
      <span class="si">${sub.icon}</span>
      <div class="sn">${sub.label}</div>
      <div class="sf">${sub.full}</div>
      <div class="sp">${pills}</div>`;
    grid.appendChild(card);
  });
}

// ── QUIZ ──
function startQuiz(s){
  csub=s;queue=buildQ(s);qi=0;sc=0;st=0;stopics={};answered=false;
  document.getElementById('homeScreen').style.display='none';
  document.getElementById('qscr').style.display='block';
  document.getElementById('qlbl').textContent=S[s].icon+' '+S[s].label;
  document.getElementById('rcard').classList.remove('show');
  document.getElementById('rcard').style.display='none';
  renderQ();
}

function renderQ(){
  if(qi>=queue.length){showResult();return;}
  const q=queue[qi],total=queue.length,col=S[csub].color;
  document.getElementById('pbar').style.width=Math.round(qi/total*100)+'%';
  document.getElementById('qctr').textContent=(qi+1)+'/'+total;
  document.getElementById('rcard').classList.remove('show');
  document.getElementById('rcard').style.display='none';
  answered=false;

  const mp=document.getElementById('mpill'),an=document.getElementById('anotice');
  if(q._m==='review'){
    mp.className='mpill review';mp.textContent='🔁 Review Mode — Weak Topic';
    an.className='anotice show';an.innerHTML=`⚠️ You've been getting <b>${q.t}</b> questions wrong. Extra practice time!`;
  }else{mp.className='mpill normal';mp.textContent='📚 Practice Mode';an.className='anotice';}

  const L=['A','B','C','D'],stars='⭐'.repeat(q.d);
  const con=document.getElementById('qcon');
  const card=document.createElement('div');
  card.className='qcard';
  card.style.cssText=`--qc:${col};border-top-color:${col}`;
  card.innerHTML=`
    <div class="qmeta">
      <span class="qtag" style="background:${col}">${q.t}</span>
      <span class="qdiff">${stars}</span>
    </div>
    <div class="qtext">${q.q}</div>
    <div class="opts" id="og">
      ${q.o.map((o,i)=>`<button class="opt" id="o${i}" onclick="checkAns(${i})"><span class="ltr">${L[i]}</span>${o}</button>`).join('')}
    </div>
    <div class="fb" id="fb"></div>
    <button class="nbtn" id="nb" onclick="nextQ()">${qi<queue.length-1?'Next Question →':'See My Results 🏆'}</button>
  `;
  con.innerHTML='';con.appendChild(card);
}

function checkAns(chosen){
  if(answered)return;answered=true;
  const q=queue[qi],ok=chosen===q.a;
  rec(csub,q.t,ok);st++;
  if(ok){sc++;gs.pts+=(q.d*4);}else{gs.pts=Math.max(0,gs.pts-1);}
  document.getElementById('totalPts').textContent=gs.pts;
  if(!stopics[q.t])stopics[q.t]={c:0,n:0};
  stopics[q.t].n++;if(ok)stopics[q.t].c++;
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  document.getElementById('o'+q.a).classList.add('correct');
  if(!ok)document.getElementById('o'+chosen).classList.add('wrong');
  const fb=document.getElementById('fb');
  fb.className='fb show '+(ok?'ok':'fail');
  fb.innerHTML=(ok?'🎉 Correct! ':'❌ Not quite! ')+q.e;
  document.getElementById('nb').classList.add('show');
}

function nextQ(){qi++;renderQ();}
function goHome(){csub=null;renderHome();}

function showResult(){
  document.getElementById('qcon').innerHTML='';
  document.getElementById('anotice').className='anotice';
  const pct=st>0?Math.round(sc/st*100):0;
  let trophy='📚',title='Keep Going!';
  if(pct>=90){trophy='🥇';title='Champion!';}else if(pct>=70){trophy='🥈';title='Great Job!';}else if(pct>=50){trophy='🥉';title='Good Try!';}
  const wt=weakOf(csub);
  const nhtml=wt.length>0
    ?`<div class="rnotice warn">🎯 Extra practice next time on: <b>${wt.join(', ')}</b></div>`
    :`<div class="rnotice ok">✅ No weak topics detected. Excellent!</div>`;
  const bhtml=Object.entries(stopics).map(([t,s])=>{
    const tp=Math.round(s.c/s.n*100);
    const bc=tp>=70?'#00897b':tp>=50?'#f9a825':'#e53935';
    return `<div class="trow">
      <span class="tlbl">${t}${tp<50?'<span class="wk">WEAK</span>':''}</span>
      <div class="bwrap"><div class="bfill" style="width:${tp}%;background:${bc}"></div></div>
      <span class="bpct">${tp}%</span>
    </div>`;
  }).join('');
  const rc=document.getElementById('rcard');
  rc.innerHTML=`
    <div class="rtrophy">${trophy}</div>
    <div class="rtitle">${title}</div>
    <div class="rfrac">${sc} / ${st}</div>
    <div class="rpct">${pct}% Accuracy</div>
    ${nhtml}
    <div class="breakdown"><h3>📊 Topic-wise Performance</h3>${bhtml}</div>
    <div class="rbtns">
      <button class="rbtn primary" onclick="startQuiz('${csub}')">🔁 Retry (Adaptive)</button>
      <button class="rbtn secondary" onclick="goHome()">🏠 All Subjects</button>
    </div>`;
  rc.style.display='block';setTimeout(()=>rc.classList.add('show'),20);
}

function shuf(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

renderHome();
</script>
